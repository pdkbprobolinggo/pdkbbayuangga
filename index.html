<!DOCTYPE html>
<html lang="id" class="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Tim PDKB</title>
    
    <!-- Memuat Tailwind CSS agar tampilan rapi -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Konfigurasi Tailwind untuk Mode Gelap -->
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {}
        }
      }
    </script>
    
    <!-- Memuat React dan ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Memuat Babel untuk menerjemahkan JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-[#f4f6f9] dark:bg-slate-900 transition-colors duration-300">
    
    <!-- Tempat memunculkan pesan jika terjadi gagal render -->
    <div id="error-display" style="color: #ef4444; padding: 20px; font-family: sans-serif; display: none; background: #fee2e2; border-bottom: 2px solid #ef4444;"></div>
    <script>
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        var errDiv = document.getElementById('error-display');
        errDiv.style.display = 'block';
        errDiv.innerHTML = '<strong>⚠️ Terjadi Error:</strong><br>' + msg + '<br><small>Baris: ' + lineNo + '</small><br><br>Coba <b>Refresh</b> halaman.';
        return false;
      };
    </script>

    <div id="root"></div>

    <!-- Kode React Utama -->
    <script type="text/babel" data-presets="react,env">
        const { useState, useEffect } = React;

        // --- KONFIGURASI LINK CSV SPREADSHEET BARU ---
        const SPREADSHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSqYJdD6mLpndU8JFPQLdOG73AMcSAfW8gmU3QYvgbbNJEufc_af9JBM-k4DuNIpui6hoB17OGNPDdS/pub?output=csv';

        // Ikon-Ikon SVG
        const MenuIcon = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>;
        const Zap = ({ size = 24, className = "", fill="none" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>;
        const RefreshCw = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>;
        const Moon = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>;
        const Sun = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>;
        const Target = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle></svg>;
        const ChevronDown = ({ size = 12, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="6 9 12 15 18 9"></polyline></svg>;
        const LayoutDashboard = ({ size = 18, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg>;
        const NetworkIcon = ({ size = 18, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="16" y="16" width="6" height="6" rx="1"></rect><rect x="2" y="16" width="6" height="6" rx="1"></rect><rect x="9" y="2" width="6" height="6" rx="1"></rect><path d="M5 16v-3a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v3"></path><path d="M12 12V8"></path></svg>;
        const Factory = ({ size = 18, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M2 20a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8l-7 5V8l-7 5V4a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2Z"></path></svg>;
        const CheckSquare = ({ size = 18, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="9 11 12 14 22 4"></polyline><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>;

        const teamData = {
          assistantManager: { name: "Andri Dwi Ariyanto", role: "AsMan PDKB" },
          pdkbJaringan: [
            { id: 101, name: "Dwi Mulyono", role: "SPV PDKB Jaringan", phone: "0812-7788-9901" },
            { id: 102, name: "Moch Andiki K.", role: "JTC SUTT/SUTET", phone: "0812-7788-9902" },
            { id: 103, name: "Fahmi Imadul B.", role: "JTC SUTT/SUTET", phone: "0812-7788-9903" },
            { id: 104, name: "M. Ilham Muzakki", role: "JTC SUTT/SUTET", phone: "0812-7788-9903" },
            { id: 105, name: "Sofyan Hendy S.", role: "JTC SUTT/SUTET", phone: "0812-7788-9904" },
            { id: 106, name: "Muhammad Qivly", role: "JTC SUTT/SUTET", phone: "0812-7788-9902" },
            { id: 107, name: "Alwi Daffa R.", role: "JTC SUTT/SUTET", phone: "0812-7788-9903" },
            { id: 108, name: "Alfian Wisnu A.", role: "JTC SUTT/SUTET", phone: "0812-7788-9904" },
            { id: 109, name: "Achmad Faried W.", role: "JTC SUTT/SUTET", phone: "0812-7788-9904" }
          ],
          pdkbGarduInduk: [
            { id: 201, name: "M. Annuur Ridwan P.", role: "SPV PDKB GI", phone: "0813-1122-3344" },
            { id: 202, name: "Ramadani Gamarido", role: "JTC GI/GITET", phone: "0813-1122-3345" },
            { id: 203, name: "Evrizal Wardhana", role: "JTC GI/GITET", phone: "0813-1122-3346" },
            { id: 204, name: "M. Anwar Shiddiq", role: "JTC GI/GITET", phone: "0813-1122-3347" }
          ],
          peralatan: [
            { id: 1, name: "Telescopic Hot Stick", qty: 6, status: "Layak" },
            { id: 2, name: "Bypass Cable System", qty: 2, status: "Layak" },
            { id: 3, name: "Insulated Gloves", qty: 8, status: "Uji Ulang" },
            { id: 4, name: "Insulation Tester", qty: 3, status: "Layak" }
          ],
          defaultTargetsAndRealisasi: [
            { id: 1, item: "Sedang Menarik Data CSV...", target: 0, completed: 0 }
          ]
        };

        const historyYears = [2026, 2025, 2024, 2023, 2022, 2021, 2020];

        function App() {
          const [topMenu, setTopMenu] = useState('Overview');
          const [activeTab, setActiveTab] = useState('pdkbJaringan');
          
          const [sheetData, setSheetData] = useState(teamData.defaultTargetsAndRealisasi);
          const [isLoading, setIsLoading] = useState(true);
          const [errorMessage, setErrorMessage] = useState("");
          
          const [refreshTrigger, setRefreshTrigger] = useState(0);
          const [isDarkMode, setIsDarkMode] = useState(false);
          
          // State Hamburger Menu
          const [isMainMenuOpen, setIsMainMenuOpen] = useState(false);

          useEffect(() => {
            if (isDarkMode) {
              document.documentElement.classList.add('dark');
            } else {
              document.documentElement.classList.remove('dark');
            }
          }, [isDarkMode]);

          // Penarik Data Format Baru (CSV Mirror Sheet)
          useEffect(() => {
            setIsLoading(true);
            setErrorMessage("");
            
            // Tambahkan timestamp agar selalu menarik data paling baru (tidak kena cache)
            const url = `${SPREADSHEET_CSV_URL}&_t=${new Date().getTime()}`;
            
            fetch(url)
              .then(response => response.text())
              .then(text => {
                if (text.trim().startsWith('<!DOCTYPE html>')) {
                  throw new Error("Link salah, ini mengarah ke halaman web biasa, bukan file CSV.");
                }

                // Memecah teks CSV berdasarkan baris (Enter)
                const rows = text.split(/\r?\n/).filter(line => line.trim() !== '');
                const formattedData = [];
                
                rows.forEach((rowStr, index) => {
                  // Sistem cerdas untuk memisahkan kolom dengan koma, tapi mengabaikan koma di dalam teks (quotes)
                  let row = [];
                  let current = '';
                  let inQuotes = false;
                  for (let i = 0; i < rowStr.length; i++) {
                      if (rowStr[i] === '"') {
                          inQuotes = !inQuotes;
                      } else if (rowStr[i] === ',' && !inQuotes) {
                          row.push(current.trim());
                          current = '';
                      } else {
                          current += rowStr[i];
                      }
                  }
                  row.push(current.trim());

                  // Kita asumsikan format Mirror Sheet Anda: Kolom 1 = Item, Kolom 2 = Target, Kolom 3 = Realisasi
                  if (row.length >= 3) {
                    const itemText = row[0].replace(/(^"|"$)/g, '').trim();
                    // Bersihkan angka dari simbol (seperti titik atau huruf)
                    const targetNum = Number(row[1].replace(/[^0-9.-]+/g,""));
                    const completedNum = Number(row[2].replace(/[^0-9.-]+/g,""));

                    // Jangan masukkan baris jika itu adalah Header (misal teksnya "Item" atau "Target")
                    const lowerItem = itemText.toLowerCase();
                    if (itemText && lowerItem !== 'item' && lowerItem !== 'pekerjaan' && lowerItem !== 'target') {
                        formattedData.push({
                            id: index + 1,
                            item: itemText,
                            target: isNaN(targetNum) ? 0 : targetNum,
                            completed: isNaN(completedNum) ? 0 : completedNum
                        });
                    }
                  }
                });

                if(formattedData.length > 0) {
                    setSheetData(formattedData);
                } else {
                    throw new Error("Data CSV kosong atau kolomnya tidak sesuai format.");
                }
              })
              .catch(error => {
                console.error("Error CSV Fetch:", error);
                setErrorMessage(error.message);
              })
              .finally(() => {
                setIsLoading(false);
              });

          }, [refreshTrigger]); 

          const topMenuItems = [
            { id: 'Overview', label: 'Overview', icon: LayoutDashboard, hasDropdown: false },
            { id: 'Jaringan', label: 'Jaringan', icon: NetworkIcon, hasDropdown: true },
            { id: 'GarduInduk', label: 'Gardu Induk', icon: Factory, hasDropdown: true },
            { id: 'Realisasi', label: 'Realisasi', icon: CheckSquare, hasDropdown: true },
            { id: 'Target', label: 'Target Kinerja', icon: Target, hasDropdown: true }
          ];

          return (
            <div className="min-h-screen bg-[#f4f6f9] dark:bg-slate-900 font-sans text-slate-800 dark:text-slate-100 transition-colors duration-300">
              
              <div className="sticky top-0 z-20">
                <nav className="bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 px-4 py-3 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 transition-colors duration-300">
                  <div className="flex items-center gap-4">
                    
                    {/* MENU HAMBURGER DROPDOWN */}
                    <div className="relative">
                      <button 
                        onClick={() => setIsMainMenuOpen(!isMainMenuOpen)}
                        onBlur={() => setTimeout(() => setIsMainMenuOpen(false), 200)}
                        className="p-2 border border-slate-200 dark:border-slate-600 rounded-lg text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors cursor-pointer"
                      >
                        <MenuIcon size={20} />
                      </button>

                      {isMainMenuOpen && (
                        <div className="absolute left-0 top-full mt-2 w-52 bg-white dark:bg-slate-800 rounded-lg shadow-lg border border-slate-200 dark:border-slate-700 py-1.5 z-50 animate-in fade-in slide-in-from-top-2 duration-200">
                          {['Personil', 'Target', 'Realisasi', 'Status Alat', 'FTE'].map((item, idx) => (
                            <button 
                              key={idx}
                              className="w-full text-left px-4 py-2.5 text-sm font-semibold text-slate-700 dark:text-slate-300 hover:bg-blue-50 dark:hover:bg-slate-700/50 hover:text-blue-600 dark:hover:text-blue-400 transition-colors"
                              onClick={() => {
                                alert(`Menu ${item} dipilih`);
                                setIsMainMenuOpen(false);
                              }}
                            >
                              {item}
                            </button>
                          ))}
                        </div>
                      )}
                    </div>

                    <div className="flex items-center gap-3">
                      <div className="bg-blue-600 text-white p-2 rounded-lg shadow-sm flex items-center justify-center w-10 h-10">
                        <Zap size={22} fill="currentColor" />
                      </div>
                      <div>
                        <h1 className="font-bold text-slate-800 dark:text-slate-100 text-lg leading-tight">Dashboard Monitoring Tim PDKB</h1>
                        <p className="text-[11px] text-slate-500 dark:text-slate-400 uppercase tracking-wide">PT PLN (PERSERO) UPT PROBOLINGGO</p>
                      </div>
                    </div>
                  </div>
                  
                  <div className="flex items-center gap-2 self-end sm:self-auto">
                    <button 
                      onClick={() => setRefreshTrigger(prev => prev + 1)} 
                      disabled={isLoading}
                      className="flex items-center gap-2 px-3 py-1.5 border border-slate-200 dark:border-slate-600 rounded-lg text-sm font-medium text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors shadow-sm bg-white dark:bg-slate-800 disabled:opacity-50"
                    >
                      <RefreshCw size={14} className={`text-blue-500 ${isLoading ? 'animate-spin' : ''}`} /> 
                      {isLoading ? 'Memuat...' : 'Refresh'}
                    </button>
                    
                    <button 
                      onClick={() => setIsDarkMode(!isDarkMode)} 
                      className="flex items-center gap-2 px-3 py-1.5 border border-slate-200 dark:border-slate-600 rounded-lg text-sm font-medium text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors shadow-sm bg-white dark:bg-slate-800"
                    >
                      {isDarkMode ? (
                        <><Sun size={14} className="text-amber-400" /> Light</>
                      ) : (
                        <><Moon size={14} className="text-indigo-500" /> Dark</>
                      )}
                    </button>
                  </div>
                </nav>

                <div className="bg-[#0e487a] dark:bg-[#072642] text-white shadow-md transition-colors duration-300">
                  <div className="max-w-7xl mx-auto px-2 flex flex-wrap sm:flex-nowrap justify-center overflow-visible">
                    {topMenuItems.map(menu => (
                      <div key={menu.id} className="relative group flex-1 sm:flex-none">
                        <button
                          onClick={() => setTopMenu(menu.id)}
                          className={`w-full flex flex-col items-center justify-center min-w-[100px] sm:min-w-[120px] py-2 px-4 border-b-4 transition-all duration-200 ${
                            topMenu === menu.id 
                              ? 'border-[#3eb0f7] text-white bg-white/10' 
                              : 'border-transparent text-blue-200 dark:text-blue-300 hover:text-white hover:bg-white/5'
                          }`}
                        >
                          <menu.icon size={18} className="mb-1" />
                          <div className="flex items-center gap-1.5 text-[11px] font-semibold tracking-wide">
                            {menu.label}
                            {menu.hasDropdown && <ChevronDown size={10} className="opacity-70 group-hover:opacity-100 transition-transform duration-200 group-hover:rotate-180" />}
                          </div>
                        </button>

                        {menu.hasDropdown && (
                          <div className="absolute left-1/2 -translate-x-1/2 top-full mt-0 w-36 bg-white dark:bg-slate-800 rounded-b-lg shadow-xl border border-t-0 border-slate-200 dark:border-slate-700 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 z-50">
                            <div className="py-1">
                              <div className="px-3 py-1.5 text-[10px] font-bold text-slate-400 dark:text-slate-500 border-b border-slate-100 dark:border-slate-700/50 uppercase tracking-wider text-center">
                                Pilih Tahun
                              </div>
                              {historyYears.map(year => (
                                <button 
                                  key={year}
                                  className="block w-full text-center px-4 py-2 text-xs font-medium text-slate-700 dark:text-slate-300 hover:bg-blue-50 dark:hover:bg-slate-700 hover:text-blue-600 dark:hover:text-blue-400 transition-colors"
                                  onClick={(e) => {
                                    e.stopPropagation();
                                    setTopMenu(menu.id);
                                    alert(`Tahun ${year} dipilih untuk ${menu.label}`);
                                  }}
                                >
                                  Tahun {year}
                                </button>
                              ))}
                            </div>
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                </div>
              </div>

              <main className="max-w-7xl mx-auto p-4 md:p-6 lg:p-8">
                
                {errorMessage && (
                  <div className="mb-6 bg-red-50 dark:bg-red-900/30 border-l-4 border-red-500 p-4 rounded-md text-red-700 dark:text-red-400 text-sm font-medium shadow-sm">
                    ⚠️ {errorMessage}
                  </div>
                )}

                <section>
                  <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-5">
                    
                    {/* KOLOM 1: PERSONIL TIM */}
                    <div className="bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm p-5 flex flex-col transition-colors duration-300">
                      <div className="flex justify-between items-center mb-5">
                        <h2 className="text-xl font-extrabold text-blue-600 dark:text-blue-400 tracking-tight">PERSONIL TIM</h2>
                      </div>
                      
                      <div className="mb-4">
                        <div className="flex justify-between items-center py-2.5 border-b border-dashed border-slate-200 dark:border-slate-700 text-sm">
                          <span className="text-slate-500 dark:text-slate-400">Asman PDKB</span>
                          <span className="font-bold text-slate-800 dark:text-slate-100 text-right">{teamData.assistantManager.name}</span>
                        </div>
                      </div>

                      <div className="flex gap-1 mb-3 bg-slate-100 dark:bg-slate-900/50 p-1 rounded-lg">
                        <button onClick={() => setActiveTab('pdkbJaringan')} className={`flex-1 text-center py-1.5 text-[11px] font-bold rounded-md transition-all ${activeTab === 'pdkbJaringan' ? 'bg-white dark:bg-slate-700 text-blue-600 dark:text-blue-400 shadow-sm' : 'text-slate-500 dark:text-slate-400'}`}>
                          Jaringan
                        </button>
                        <button onClick={() => setActiveTab('pdkbGarduInduk')} className={`flex-1 text-center py-1.5 text-[11px] font-bold rounded-md transition-all ${activeTab === 'pdkbGarduInduk' ? 'bg-white dark:bg-slate-700 text-emerald-600 dark:text-emerald-400 shadow-sm' : 'text-slate-500 dark:text-slate-400'}`}>
                          Gardu Induk
                        </button>
                      </div>

                      <div className="flex-1 overflow-y-auto pr-1 max-h-80 space-y-1">
                        {teamData[activeTab].map((member) => (
                          <div key={member.id} className="flex justify-between items-center py-2.5 border-b border-dashed border-slate-200 dark:border-slate-700 last:border-0">
                            <span className="text-slate-600 dark:text-slate-300 text-[13px] font-medium truncate pr-2">{member.name}</span>
                            <span className="font-bold text-slate-800 dark:text-slate-100 text-[12px] whitespace-nowrap text-right">{member.role.replace('JTC ', '')}</span>
                          </div>
                        ))}
                      </div>
                    </div>

                    {/* KOLOM 2: TARGET PEKERJAAN */}
                    <div className="bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm p-5 flex flex-col transition-colors duration-300">
                      <div className="flex justify-between items-center mb-5">
                        <h2 className="text-xl font-extrabold text-blue-600 dark:text-blue-400 tracking-tight">TARGET</h2>
                      </div>
                      <div className="flex-1 space-y-1">
                        {isLoading ? (
                          <div className="text-center py-4 text-sm text-slate-400 animate-pulse">Menarik data CSV...</div>
                        ) : (
                          sheetData.map((t) => (
                            <div key={`t-${t.id}`} className="flex justify-between items-center py-3 border-b border-dashed border-slate-200 dark:border-slate-700 last:border-0">
                              <span className="text-slate-500 dark:text-slate-400 text-[13px]">{t.item}</span>
                              <span className="font-bold text-slate-800 dark:text-slate-100 text-[13px] text-right">{t.target}</span>
                            </div>
                          ))
                        )}
                      </div>
                    </div>

                    {/* KOLOM 3: REALISASI */}
                    <div className="bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm p-5 flex flex-col transition-colors duration-300">
                      <div className="flex justify-between items-center mb-5">
                        <h2 className="text-xl font-extrabold text-blue-600 dark:text-blue-400 tracking-tight">REALISASI</h2>
                      </div>
                      <div className="flex-1 space-y-1">
                        {isLoading ? (
                          <div className="text-center py-4 text-sm text-slate-400 animate-pulse">Menarik data CSV...</div>
                        ) : (
                          sheetData.map((r) => {
                            const percentage = r.target > 0 ? Math.round((r.completed / r.target) * 100) : 0;
                            return (
                              <div key={`r-${r.id}`} className="flex justify-between items-center py-3 border-b border-dashed border-slate-200 dark:border-slate-700 last:border-0">
                                <span className="text-slate-500 dark:text-slate-400 text-[13px] pr-2">{r.item}</span>
                                
                                <span className={`font-bold text-[13px] text-right whitespace-nowrap flex items-center gap-1.5 ${r.completed >= r.target ? 'text-green-600 dark:text-green-400' : 'text-blue-600 dark:text-blue-400'}`}>
                                  {r.completed}/{r.target} 
                                  <span className="text-[10px] font-extrabold bg-blue-50 dark:bg-blue-900/40 px-1.5 py-0.5 rounded text-blue-600 dark:text-blue-300">
                                    {percentage}%
                                  </span>
                                </span>
                              </div>
                            );
                          })
                        )}
                      </div>
                    </div>

                    {/* KOLOM 4: STATUS ALAT */}
                    <div className="bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm p-5 flex flex-col transition-colors duration-300">
                      <div className="flex justify-between items-center mb-5">
                        <h2 className="text-xl font-extrabold text-blue-600 dark:text-blue-400 tracking-tight">STATUS ALAT</h2>
                      </div>
                      <div className="flex-1 space-y-1">
                        {teamData.peralatan.map((tool) => (
                          <div key={tool.id} className="flex justify-between items-center py-3 border-b border-dashed border-slate-200 dark:border-slate-700 last:border-0">
                            <span className="text-slate-500 dark:text-slate-400 text-[13px] truncate pr-2">{tool.name} ({tool.qty})</span>
                            <span className={`font-bold text-[13px] text-right whitespace-nowrap ${tool.status === 'Layak' ? 'text-green-600 dark:text-green-400' : 'text-red-500 dark:text-red-400'}`}>
                              {tool.status}
                            </span>
                          </div>
                        ))}
                      </div>
                    </div>

                  </div>
                </section>

              </main>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <style>
      .hide-scrollbar::-webkit-scrollbar { display: none; }
      .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</body>
</html>
