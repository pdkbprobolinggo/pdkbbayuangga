<!DOCTYPE html>
<html lang="id" class="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Tim PDKB</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {}
        }
      }
    </script>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-is@18/umd/react-is.production.min.js"></script>

<body class="bg-[#f4f6f9] dark:bg-slate-900 transition-colors duration-300">
    
    <div id="error-display" style="color: #ef4444; padding: 20px; font-family: sans-serif; display: none; background: #fee2e2; border-bottom: 2px solid #ef4444;"></div>
    <script>
      window.onerror = function(msg, url, lineNo, columnNo, error) {
        var errDiv = document.getElementById('error-display');
        errDiv.style.display = 'block';
        errDiv.innerHTML = '<strong>⚠️ Terjadi Error pada Kode:</strong><br>' + msg + '<br><small>Baris: ' + lineNo + '</small><br><br>Coba periksa kembali atau refresh halaman.';
        return false;
      };
    </script>

    <div id="root"></div>

    <script type="text/babel" data-presets="react,env">
        const { useState, useEffect } = React;
        const { BarChart, Bar, LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, Legend, ResponsiveContainer } = window.Recharts;

        // --- KONFIGURASI LINK CSV SPREADSHEET MIRROR ---
        const SPREADSHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSqYJdD6mLpndU8JFPQLdOG73AMcSAfW8gmU3QYvgbbNJEufc_af9JBM-k4DuNIpui6hoB17OGNPDdS/pub?output=csv';

        // --- IKON-IKON SVG ---
        const MenuIcon = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>;
        const Zap = ({ size = 24, className = "", fill="none" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill={fill} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></svg>;
        const RefreshCw = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>;
        const Moon = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>;
        const Sun = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>;
        const Target = ({ size = 24, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><circle cx="12" cy="12" r="6"></circle><circle cx="12" cy="12" r="2"></circle></svg>;
        const ChevronDown = ({ size = 12, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="6 9 12 15 18 9"></polyline></svg>;
        const ChevronUp = ({ size = 12, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="18 15 12 9 6 15"></polyline></svg>;
        const LayoutDashboard = ({ size = 18, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="3" width="7" height="9"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="12" width="7" height="9"></rect><rect x="3" y="16" width="7" height="5"></rect></svg>;
        const CheckSquare = ({ size = 18, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="9 11 12 14 22 4"></polyline><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>;
        const ArrowLeft = ({ size = 18, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>;
        const BadgeIcon = ({ size = 18, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line><path d="M8 14h.01"></path><path d="M12 14h.01"></path><path d="M16 14h.01"></path><path d="M8 18h.01"></path><path d="M12 18h.01"></path><path d="M16 18h.01"></path></svg>;
        const AwardIcon = ({ size = 18, className = "" }) => <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="8" r="7"></circle><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"></polyline></svg>;
        
        const TowerIcon = ({ size = 18, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <path d="M8 22L12 2L16 22"></path>
                <path d="M9 16H15"></path>
                <path d="M10.5 10H13.5"></path>
                <path d="M4 16L12 9L20 16"></path>
                <path d="M7 11L12 5L17 11"></path>
            </svg>
        );
        const SwitchyardIcon = ({ size = 18, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={className}>
                <rect x="4" y="14" width="16" height="8" rx="1"></rect>
                <path d="M7 14V6c0-1.1.9-2 2-2h6c1.1 0 2 .9 2 2v8"></path>
                <path d="M10 4V2"></path>
                <path d="M14 4V2"></path>
                <path d="M12 14v4"></path>
                <line x1="8" y1="18" x2="16" y2="18"></line>
            </svg>
        );

        const teamData = {
          assistantManager: { name: "Andri Dwi Ariyanto", role: "Asman PDKB" },
          pdkbJaringan: [
            { id: 101, name: "Dwi Mulyono", role: "SPV PDKB Jaringan", nip: "8108420ZY", photo: "./images/DWI MULYONO.jpg" },
            { id: 102, name: "Moch Andiki K.", role: "JTC SUTT/SUTET", nip: "8911223ZY", photo: "./images/MOCH ANDIKI KRISGANANDA.jpg" },
            { id: 103, name: "Fahmi Imadul B.", role: "JTC SUTT/SUTET", nip: "9012345ZY", photo: "./images/FAHMI IMADUL BILAD.jpg" },
            { id: 104, name: "M. Ilham Muzakki", role: "JTC SUTT/SUTET", nip: "9214567ZY", photo: "./images/MUCHAMMAD ILHAM MUZAKKI.jpg" },
            { id: 105, name: "Sofyan Hendy S.", role: "JTC SUTT/SUTET", nip: "8810234ZY", photo: "./images/SOFYAN HENDY SUMITRO.jpg" },
            { id: 106, name: "Muhammad Qivly", role: "JTC SUTT/SUTET", nip: "97201005ZY", photo: "./images/MUHAMMAD QIVLY.jpg" },
            { id: 107, name: "Alwi Daffa R.", role: "JTC SUTT/SUTET", nip: "9518342ZY", photo: "./images/ALWI DAFFA R.jpg" },
            { id: 108, name: "Alfian Wisnu A.", role: "JTC SUTT/SUTET", nip: "9619453ZY", photo: "./images/ALFIAN WISNU ARIBOWO.jpg" },
            { id: 109, name: "Achmad Faried W.", role: "JTC SUTT/SUTET", nip: "9315678ZY", photo: "./images/ACHMAD FARIED WAHBY.jpg" }
          ],
          pdkbGarduInduk: [
            { id: 201, name: "M. Annuur Ridwan P.", role: "SPV PDKB GI", nip: "8209531ZY", photo: "./images/ANNUUR RIDWAN PRIMANTHO.jpg" },
            { id: 202, name: "Ramadani Gamarido", role: "JTC GI/GITET", nip: "9113456ZY", photo: "./images/RAMADANI GAMARIDHO.jpg" },
            { id: 203, name: "Evrizal Wardhana", role: "JTC GI/GITET", nip: "8711902ZY", photo: "./images/EVRIZAL WARDHANA.jpg" },
            { id: 204, name: "M. Anwar Shiddiq", role: "JTC GI/GITET", nip: "9417890ZY", photo: "./images/MOHAMMAD ANWAR SHIDDIQ.jpeg" }
          ],
          defaultSemester1: [],
          defaultSemester2: [],
          defaultFTE: [],
          defaultWaktuEfektif: []
        };

        const historyYears = [2026, 2025, 2024, 2023, 2022, 2021, 2020];

        // Helper Fungsi Inisial Nama
        const getInitials = (name) => {
          return name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
        };

        function App() {
          const [topMenu, setTopMenu] = useState('Overview');
          const [activeTab, setActiveTab] = useState('pdkbJaringan');
          
          const [sheetData, setSheetData] = useState({
            semester1: teamData.defaultSemester1,
            semester2: teamData.defaultSemester2,
            fteYBY: teamData.defaultFTE,
            waktuEfektif: teamData.defaultWaktuEfektif,
            certificates: {} // Menampung data sertifikat dinamis
          });
          
          const [activeSemester, setActiveSemester] = useState('semester1');
          const [currentPage, setCurrentPage] = useState('dashboard');
          const [personilType, setPersonilType] = useState('Jaringan'); // Jaringan atau Gardu Induk
          const [expandedItems, setExpandedItems] = useState({});
          const [expandedCVs, setExpandedCVs] = useState({}); // State khusus untuk Accordion CV

          const [isLoading, setIsLoading] = useState(true);
          const [errorMessage, setErrorMessage] = useState("");
          
          const [refreshTrigger, setRefreshTrigger] = useState(0);
          const [isDarkMode, setIsDarkMode] = useState(false);
          const [isMainMenuOpen, setIsMainMenuOpen] = useState(false);

          useEffect(() => {
            if (isDarkMode) {
              document.documentElement.classList.add('dark');
            } else {
              document.documentElement.classList.remove('dark');
            }
          }, [isDarkMode]);

          useEffect(() => {
            setIsLoading(true);
            setErrorMessage("");
            
            const url = `${SPREADSHEET_CSV_URL}&_t=${new Date().getTime()}`;
            
            fetch(url)
              .then(response => response.text())
              .then(text => {
                if (text.trim().startsWith('<!DOCTYPE html>')) {
                  throw new Error("Link CSV tidak valid atau belum di-Publish sebagai CSV.");
                }

                const rows = [];
                const lines = text.split(/\r?\n/).filter(line => line.trim() !== '');
                
                lines.forEach((line) => {
                  let row = [];
                  let current = '';
                  let inQuotes = false;
                  for (let i = 0; i < line.length; i++) {
                      if (line[i] === '"') {
                          inQuotes = !inQuotes;
                      } else if (line[i] === ',' && !inQuotes) {
                          row.push(current.trim());
                          current = '';
                      } else {
                          current += line[i];
                      }
                  }
                  row.push(current.trim());
                  rows.push(row);
                });

                const getVal = (colChar, rowNum) => {
                    const colIdx = colChar.toUpperCase().charCodeAt(0) - 65; 
                    const rowIdx = rowNum - 1; 
                    if (rows[rowIdx] && rows[rowIdx][colIdx] !== undefined) {
                        let rawData = rows[rowIdx][colIdx].replace(/(^"|"$)/g, '').trim();
                        // Format Indonesia: hapus titik (ribuan), ubah koma jadi titik (desimal)
                        rawData = rawData.replace(/\./g, '').replace(/,/g, '.').replace(/[^0-9.-]+/g, "");
                        return Number(rawData) || 0;
                    }
                    return 0; 
                };

                const getStr = (colChar, rowNum) => {
                    const colIdx = colChar.toUpperCase().charCodeAt(0) - 65; 
                    const rowIdx = rowNum - 1; 
                    if (rows[rowIdx] && rows[rowIdx][colIdx] !== undefined) {
                        return rows[rowIdx][colIdx].replace(/(^"|"$)/g, '').trim();
                    }
                    return "";
                };

                // Filter Cerdas: Blacklist Nama Pekerjaan Kosong
                const blacklistedNames = [
                  "asesmen gi level ii", "pemeliharaan mtu", "pemeliharaan konektor",
                  "pemeliharaan insulator dan junction", "pemeliharaan konduktor", "technical",
                  "pemeliharaan gsw", "non technical", "preventive action transmisi",
                  "asesmen transmisi level 1", "asesmen transmisi level 2", "asesmen transmisi level i (cui)",
                  "asesmen transmisi level ii", "pemeliharaan insulator, junction dan aksesoris",
                  "pencegahan gangguang akibat petir", "pencegahan gangguan akibat petir",  
                  "pemeliharaan tla", "pencegahan gangguan akibat benda asing"
                ];

                const getDetailsList = (nameCol, targetCol, realCol, startRow, endRow) => {
                    let list = [];
                    for (let i = startRow; i <= endRow; i++) {
                        const name = getStr(nameCol, i);
                        const target = getVal(targetCol, i);
                        const real = getVal(realCol, i);
                        
                        const lowerName = name.toLowerCase().trim();
                        const isBlacklisted = blacklistedNames.some(b => lowerName === b || lowerName.includes(b));
                        
                        if (name !== "" && !isBlacklisted) {
                            list.push({ name: name, target, real });
                        }
                    }
                    return list;
                };

                const makeCategory = (id, item, category, details) => {
                    const completed = details.reduce((sum, d) => sum + d.real, 0);
                    const target = details.reduce((sum, d) => sum + d.target, 0);
                    return { id, item, category, completed, target, details };
                };

                // Menarik Data Gabungan untuk FTE
                const getCombinedChartData = (startRow1, endRow1, col1, startRow2, endRow2, col2, labelCol) => {
                    let list = [];
                    const count = endRow1 - startRow1 + 1;
                    for(let i=0; i<count; i++) {
                        const label = getStr(labelCol, startRow1 + i) || getStr(labelCol, startRow2 + i) || `Tahun ${i+1}`;
                        const valJaringan = getVal(col1, startRow1 + i);
                        const valGI = getVal(col2, startRow2 + i);
                        
                        if (valJaringan !== 0 || valGI !== 0) {
                            list.push({ name: label, Jaringan: valJaringan, GarduInduk: valGI });
                        }
                    }
                    return list;
                };

                // Fungsi Menarik Data Sertifikat dari Google Sheets
                const getCertificatesData = (nameCol, certCol, startRow, endRow) => {
                    let certMap = {};
                    for (let i = startRow; i <= endRow; i++) {
                        const name = getStr(nameCol, i).trim();
                        const certStr = getStr(certCol, i).trim();
                        
                        if (name !== "" && certStr !== "") {
                            // Memisahkan sertifikat berdasarkan koma (,) atau baris baru
                            const certs = certStr.split(/,|\n/).map(c => c.trim()).filter(c => c !== "");
                            
                            if (certMap[name]) {
                                certMap[name] = [...certMap[name], ...certs];
                            } else {
                                certMap[name] = certs;
                            }
                        }
                    }
                    return certMap;
                };

                // --- MAPPING DATA SEMESTER 1 ---
                const sem1Data = [
                  makeCategory('g-1', "PREVENTIVE ACTION", 'Gardu Induk', getDetailsList('A', 'C', 'D', 4, 14)),
                  makeCategory('g-2', "CORRECTIVE ACTION", 'Gardu Induk', getDetailsList('A', 'C', 'D', 16, 29)),
                  makeCategory('g-3', "PROGRAM KEANDALAN", 'Gardu Induk', getDetailsList('A', 'C', 'D', 31, 41)),
                  makeCategory('j-1', "PREVENTIVE ACTION", 'Jaringan', getDetailsList('A', 'C', 'D', 50, 59)),
                  makeCategory('j-2', "CORRECTIVE ACTION", 'Jaringan', getDetailsList('A', 'C', 'D', 61, 70)),
                  makeCategory('j-3', "PROGRAM KEANDALAN", 'Jaringan', getDetailsList('A', 'C', 'D', 73, 88))
                ];

                // --- MAPPING DATA SEMESTER 2 ---
                const sem2Data = [
                  makeCategory('g-4', "PREVENTIVE ACTION", 'Gardu Induk', getDetailsList('A', 'F', 'G', 4, 14)),
                  makeCategory('g-5', "CORRECTIVE ACTION", 'Gardu Induk', getDetailsList('A', 'F', 'G', 16, 29)),
                  makeCategory('g-6', "PROGRAM KEANDALAN", 'Gardu Induk', getDetailsList('A', 'F', 'G', 31, 41)),
                  makeCategory('j-4', "PREVENTIVE ACTION", 'Jaringan', getDetailsList('A', 'F', 'G', 50, 59)),
                  makeCategory('j-5', "CORRECTIVE ACTION", 'Jaringan', getDetailsList('A', 'F', 'G', 61, 70)),
                  makeCategory('j-6', "PROGRAM KEANDALAN", 'Jaringan', getDetailsList('A', 'F', 'G', 73, 88))
                ];

                // --- MAPPING DATA FTE ---
                const fteYBYData = getCombinedChartData(107, 115, 'B', 129, 137, 'B', 'A');
                const waktuEfektifData = getCombinedChartData(97, 105, 'B', 119, 127, 'B', 'A');

                // --- MAPPING DATA SERTIFIKAT (Koordinat Sementara: Kolom K & L, Baris 150-200) ---
                // Anda dapat mengubah huruf K, L, dan angka 150, 200 di bawah ini sesuai posisi tabel di Spreadsheet Anda.
                const certificatesData = getCertificatesData('K', 'L', 150, 200);

                setSheetData({
                  semester1: sem1Data,
                  semester2: sem2Data,
                  fteYBY: fteYBYData,
                  waktuEfektif: waktuEfektifData,
                  certificates: certificatesData // Memasukkan data sertifikat ke dalam sistem
                });
              })
              .catch(error => {
                console.error("Gagal menarik data:", error);
                setErrorMessage("Gagal mengambil data akurat. Pastikan format CSV dan koordinat sel benar.");
              })
              .finally(() => {
                setIsLoading(false);
              });

          }, [refreshTrigger]); 

          const topMenuItems = [
            { id: 'Overview', label: 'Overview', icon: LayoutDashboard, hasDropdown: false },
            { id: 'Jaringan', label: 'Jaringan', icon: TowerIcon, hasDropdown: true, dropItems: ['FTE', 'Personil'] },
            { id: 'GarduInduk', label: 'Gardu Induk', icon: SwitchyardIcon, hasDropdown: true, dropItems: ['FTE', 'Personil'] },
            { id: 'Realisasi', label: 'Realisasi', icon: CheckSquare, hasDropdown: true },
            { id: 'Target', label: 'Target Kinerja', icon: Target, hasDropdown: true }
          ];

          const currentDisplayData = sheetData[activeSemester] || [];
          const formatChartData = (category) => {
            return currentDisplayData
              .filter(d => d.category === category)
              .map(d => ({
                name: d.item.replace(' ACTION', '').replace('PROGRAM ', ''),
                Target: d.target,
                Realisasi: d.completed
              }));
          };
          const chartDataJaringan = formatChartData('Jaringan');
          const chartDataGI = formatChartData('Gardu Induk');

          const CustomTooltip = ({ active, payload, label }) => {
            if (active && payload && payload.length) {
              return (
                <div className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-3 rounded-lg shadow-lg">
                  <p className="font-bold text-slate-800 dark:text-slate-100 mb-2">{label}</p>
                  {payload.map((entry, index) => (
                    <p key={`item-${index}`} className="text-sm" style={{ color: entry.color }}>
                      {entry.name}: <span className="font-bold">{typeof entry.value === 'number' ? entry.value.toLocaleString('id-ID') : entry.value}</span>
                    </p>
                  ))}
                </div>
              );
            }
            return null;
          };

          const toggleAccordion = (id) => {
            setExpandedItems(prev => ({ ...prev, [id]: !prev[id] }));
          };
          const toggleCVAccordion = (id) => {
            setExpandedCVs(prev => ({ ...prev, [id]: !prev[id] }));
          };

          return (
            <div className="min-h-screen bg-[#f4f6f9] dark:bg-slate-900 font-sans text-slate-800 dark:text-slate-100 transition-colors duration-300">
              
              {}
              <div className="sticky top-0 z-30">
                <nav className="bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 px-4 py-3 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 transition-colors duration-300">
                  <div className="flex items-center gap-4">
                    <div className="relative">
                      <button onClick={() => setIsMainMenuOpen(!isMainMenuOpen)} onBlur={() => setTimeout(() => setIsMainMenuOpen(false), 200)} className="p-2 border border-slate-200 dark:border-slate-600 rounded-lg text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors cursor-pointer">
                        <MenuIcon size={20} />
                      </button>
                    </div>
                    <div className="flex items-center gap-3">

                        <div className="flex gap-1 mb-3 bg-slate-100 dark:bg-slate-900/50 p-1 rounded-lg">
                          <button onClick={() => setActiveTab('pdkbJaringan')} className={`flex-1 text-center py-1.5 text-[11px] font-bold rounded-md transition-all ${activeTab === 'pdkbJaringan' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500'}`}>Jaringan</button>
                          <button onClick={() => setActiveTab('pdkbGarduInduk')} className={`flex-1 text-center py-1.5 text-[11px] font-bold rounded-md transition-all ${activeTab === 'pdkbGarduInduk' ? 'bg-white text-emerald-600 shadow-sm' : 'text-slate-500'}`}>Gardu Induk</button>
                        </div>

                        <div className="flex-1 overflow-y-auto pr-1 max-h-80 space-y-1">
                          {teamData[activeTab].map((member) => (
                            <div key={member.id} className="flex justify-between items-center py-2.5 border-b border-dashed border-slate-200 dark:border-slate-700 last:border-0">
                              <span className="text-slate-600 dark:text-slate-300 text-[13px] font-medium truncate pr-2">{member.name}</span>
                              <span className="font-bold text-slate-800 dark:text-slate-100 text-[12px] whitespace-nowrap text-right">{member.role}</span>
                            </div>
                          ))}
                        </div>
                      </div>

                      {/* KOLOM 2: REALISASI JARINGAN (Accordion) */}
                      <div className="bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm p-5 flex flex-col transition-colors duration-300">
                        <div className="flex justify-between items-center mb-5">
                          <h2 className="text-xl font-extrabold text-blue-600 dark:text-blue-400 tracking-tight">DETAIL JARINGAN</h2>
                        </div>
                        <div className="flex-1 space-y-3">
                          {isLoading ? (
                            <div className="text-center py-4 text-sm text-slate-400 animate-pulse">Menarik data...</div>
                          ) : (
                            currentDisplayData.filter(d => d.category === 'Jaringan').map((r) => {
                              const percentage = r.target > 0 ? Math.round((r.completed / r.target) * 100) : 0;
                              const isExpanded = expandedItems[r.id];

                              return (
                                <div key={r.id} className="py-2 border-b border-dashed border-slate-200 dark:border-slate-700 last:border-0">
                                  <div onClick={() => toggleAccordion(r.id)} className="flex justify-between items-center mb-1.5 cursor-pointer group">
                                    <span className="text-slate-700 dark:text-slate-300 text-[13px] font-bold tracking-wide group-hover:text-blue-600 transition-colors">{r.item}</span>
                                    <div className="flex items-center gap-2">
                                      <span className="font-extrabold text-[13px] text-blue-600">{r.completed}/{r.target} <span className="ml-1 text-[10px] bg-blue-50 px-1.5 py-0.5 rounded">{percentage}%</span></span>
                                      {isExpanded ? <ChevronUp size={16} className="text-slate-400" /> : <ChevronDown size={16} className="text-slate-400" />}
                                    </div>
                                  </div>
                                  <div className="w-full bg-slate-100 dark:bg-slate-700 h-1.5 rounded-full overflow-hidden">
                                    <div className="bg-blue-500 h-full transition-all duration-500" style={{ width: `${Math.min(percentage, 100)}%` }}></div>
                                  </div>
                                  {isExpanded && (
                                    <div className="mt-3 bg-slate-50 dark:bg-slate-800/80 rounded-xl p-3.5 space-y-2 border border-slate-100 dark:border-slate-700 animate-in fade-in slide-in-from-top-2 duration-300">
                                      {r.details && r.details.length > 0 ? (
                                        r.details.map((detail, idx) => (
                                          <div key={idx} className="flex justify-between items-center text-[12px] border-b border-slate-200 dark:border-slate-700/50 last:border-0 pb-1.5 last:pb-0">
                                            <span className="text-slate-600 dark:text-slate-400">{detail.name}</span>
                                            <span className={`font-bold ${detail.real >= detail.target ? 'text-green-600' : 'text-amber-500'}`}>{detail.real} / {detail.target}</span>
                                          </div>
                                        ))
                                      ) : ( <div className="text-xs text-slate-400 text-center italic py-2">Tidak ada rincian.</div> )}
                                    </div>
                                  )}
                                </div>
                              );
                            })
                          )}
                        </div>
                      </div>

                      {/* KOLOM 3: REALISASI GARDU INDUK (Accordion) */}
                      <div className="bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm p-5 flex flex-col transition-colors duration-300">
                        <div className="flex justify-between items-center mb-5">
                          <h2 className="text-xl font-extrabold text-emerald-600 dark:text-emerald-400 tracking-tight">DETAIL GARDU INDUK</h2>
                        </div>
                        <div className="flex-1 space-y-3">
                          {isLoading ? (
                            <div className="text-center py-4 text-sm text-slate-400 animate-pulse">Menarik data...</div>
                          ) : (
                            currentDisplayData.filter(d => d.category === 'Gardu Induk').map((r) => {
                              const percentage = r.target > 0 ? Math.round((r.completed / r.target) * 100) : 0;
                              const isExpanded = expandedItems[r.id];

                              return (
                                <div key={r.id} className="py-2 border-b border-dashed border-slate-200 dark:border-slate-700 last:border-0">
                                  <div onClick={() => toggleAccordion(r.id)} className="flex justify-between items-center mb-1.5 cursor-pointer group">
                                    <span className="text-slate-700 dark:text-slate-300 text-[13px] font-bold tracking-wide group-hover:text-emerald-600 transition-colors">{r.item}</span>
                                    <div className="flex items-center gap-2">
                                      <span className="font-extrabold text-[13px] text-emerald-600">{r.completed}/{r.target} <span className="ml-1 text-[10px] bg-emerald-50 px-1.5 py-0.5 rounded">{percentage}%</span></span>
                                      {isExpanded ? <ChevronUp size={16} className="text-slate-400" /> : <ChevronDown size={16} className="text-slate-400" />}
                                    </div>
                                  </div>
                                  <div className="w-full bg-slate-100 dark:bg-slate-700 h-1.5 rounded-full overflow-hidden">
                                    <div className="bg-emerald-500 h-full transition-all duration-500" style={{ width: `${Math.min(percentage, 100)}%` }}></div>
                                  </div>
                                  {isExpanded && (
                                    <div className="mt-3 bg-slate-50 dark:bg-slate-800/80 rounded-xl p-3.5 space-y-2 border border-slate-100 dark:border-slate-700 animate-in fade-in slide-in-from-top-2 duration-300">
                                      {r.details && r.details.length > 0 ? (
                                        r.details.map((detail, idx) => (
                                          <div key={idx} className="flex justify-between items-center text-[12px] border-b border-slate-200 dark:border-slate-700/50 last:border-0 pb-1.5 last:pb-0">
                                            <span className="text-slate-600 dark:text-slate-400">{detail.name}</span>
                                            <span className={`font-bold ${detail.real >= detail.target ? 'text-green-600' : 'text-amber-500'}`}>{detail.real} / {detail.target}</span>
                                          </div>
                                        ))
                                      ) : ( <div className="text-xs text-slate-400 text-center italic py-2">Tidak ada rincian.</div> )}
                                    </div>
                                  )}
                                </div>
                              );
                            })
                          )}
                        </div>
                      </div>

                    </div>
                  </section>
                </main>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <style>
      .hide-scrollbar::-webkit-scrollbar { display: none; }
      .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</body>
</html>
