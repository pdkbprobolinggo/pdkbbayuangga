        // --- DATA TIM PDKB ---

            { id: 102, name: "Moch Andiki K.", role: "JTC SUTT/SUTET", nip: "9210456ZY", phone: "0812-3456-7891", sertifikat: ["Sertifikasi PDKB TM", "Bekerja di Ketinggian (TKBT)", "K3 Listrik"] },
            { id: 103, name: "Fahmi Imadul B.", role: "JTC SUTT/SUTET", nip: "9311789ZY", phone: "0812-3456-7892", sertifikat: ["Sertifikasi PDKB TM", "Bekerja di Ketinggian (TKBT)", "First Aid K3"] },
            { id: 104, name: "M. Ilham Muzakki", role: "JTC SUTT/SUTET", nip: "9412123ZY", phone: "0812-3456-7893", sertifikat: ["Sertifikasi PDKB TM", "Bekerja di Ketinggian (TKBT)"] },
            { id: 105, name: "Sofyan Hendy S.", role: "JTC SUTT/SUTET", nip: "9213456ZY", phone: "0812-3456-7894", sertifikat: ["Sertifikasi PDKB TM", "Bekerja di Ketinggian (TKBT)", "K3 Listrik Dasar"] },
            { id: 106, name: "Muhammad Qivly", role: "JTC SUTT/SUTET", nip: "97201005ZY", phone: "0821-4579-8722", sertifikat: ["Sertifikasi PDKB TM", "Bekerja di Ketinggian (TKBT)", "K3 Umum"] },
            { id: 107, name: "Alwi Daffa R.", role: "JTC SUTT/SUTET", nip: "9815123ZY", phone: "0812-3456-7896", sertifikat: ["Sertifikasi PDKB TM", "Bekerja di Ketinggian (TKBT)"] },

            { id: 109, name: "Achmad Faried W.", role: "JTC SUTT/SUTET", nip: "9917789ZY", phone: "0812-3456-7898", sertifikat: ["Sertifikasi PDKB TM", "Bekerja di Ketinggian (TKBT)"] }
          ],
          pdkbGarduInduk: [
            // Penambahan foto untuk M. Annuur Ridwan P.
            { id: 201, name: "M. Annuur Ridwan P.", role: "TL PDKB GI", nip: "8608123ZY", phone: "0813-1122-3344", sertifikat: ["Diklat Pengawas K3", "Sertifikasi PDKB GI", "Ahli K3 Umum"], photo: "./images/ANNUUR RIDWAN PRIMANTHO.jpg" },
            { id: 202, name: "Ramadani Gamarido", role: "TC GI/GITET", nip: "9109456ZY", phone: "0813-1122-3345", sertifikat: ["Sertifikasi PDKB GI", "Pemeliharaan Trafo", "K3 Listrik"] },
            { id: 203, name: "Evrizal Wardhana", role: "JTC GI/GITET", nip: "9310789ZY", phone: "0813-1122-3346", sertifikat: ["Sertifikasi PDKB GI", "Pemeliharaan Switchyard", "First Aid K3"] },
            { id: 204, name: "M. Anwar Shiddiq", role: "JTC GI/GITET", nip: "9511123ZY", phone: "0813-1122-3347", sertifikat: ["Sertifikasi PDKB GI", "Pemeliharaan Switchyard"] }
          ],
          defaultSemester1: [],
          defaultSemester2: [],
          defaultFTE: [],
          defaultWaktuEfektif: []
        };

        const historyYears = [2026, 2025, 2024, 2023, 2022, 2021, 2020];

        // Helper Fungsi Inisial Nama & Email Dummy
        const getInitials = (name) => {
          return name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
        };
        const getDummyEmail = (name) => {
          return `${name.split(' ')[0].toLowerCase().replace('.', '')}@pln.co.id`;
        };

        function App() {
          const [topMenu, setTopMenu] = useState('Overview');
          const [activeTab, setActiveTab] = useState('pdkbJaringan'); // Untuk Tab Tim di halaman dashboard
          
          const [sheetData, setSheetData] = useState({
            semester1: teamData.defaultSemester1,
            semester2: teamData.defaultSemester2,
            fteYBY: teamData.defaultFTE,
            waktuEfektif: teamData.defaultWaktuEfektif
          });
          
          const [activeSemester, setActiveSemester] = useState('semester1');
          const [currentPage, setCurrentPage] = useState('dashboard'); // 'dashboard', 'fte', 'personil-jaringan', 'personil-gardu-induk'
          
          const [expandedItems, setExpandedItems] = useState({}); // Accordion Rincian Pekerjaan
          const [expandedCVs, setExpandedCVs] = useState({}); // Accordion Pop-down CV

          const [isLoading, setIsLoading] = useState(true);
          const [errorMessage, setErrorMessage] = useState("");
          
          const [refreshTrigger, setRefreshTrigger] = useState(0);
          const [isDarkMode, setIsDarkMode] = useState(false);
          const [isMainMenuOpen, setIsMainMenuOpen] = useState(false);

          useEffect(() => {
            if (isDarkMode) {
              document.documentElement.classList.add('dark');
            } else {
              document.documentElement.classList.remove('dark');
            }
          }, [isDarkMode]);

          // Membaca Data CSV Berdasarkan Titik Koordinat Sel
          useEffect(() => {
            setIsLoading(true);
            setErrorMessage("");
            
            const url = `${SPREADSHEET_CSV_URL}&_t=${new Date().getTime()}`;
            
            fetch(url)
              .then(response => response.text())
              .then(text => {
                if (text.trim().startsWith('<!DOCTYPE html>')) {
                  throw new Error("Link CSV tidak valid atau belum di-Publish sebagai CSV.");
                }

                const rows = [];
                const lines = text.split(/\r?\n/).filter(line => line.trim() !== '');
                
                lines.forEach((line) => {
                  let row = [];
                  let current = '';
                  let inQuotes = false;
                  for (let i = 0; i < line.length; i++) {
                      if (line[i] === '"') {
                          inQuotes = !inQuotes;
                      } else if (line[i] === ',' && !inQuotes) {
                          row.push(current.trim());
                          current = '';
                      } else {
                          current += line[i];
                      }
                  }
                  row.push(current.trim());
                  rows.push(row);
                });

                // --- FUNGSI PEMBANTU KONVERSI DATA ---
                const getVal = (colChar, rowNum) => {
                    const colIdx = colChar.toUpperCase().charCodeAt(0) - 65; 
                    const rowIdx = rowNum - 1; 
                    if (rows[rowIdx] && rows[rowIdx][colIdx] !== undefined) {
                        let rawData = rows[rowIdx][colIdx].replace(/(^"|"$)/g, '').trim();
                        // Format Indonesia: hapus titik (ribuan), ubah koma jadi titik (desimal sistem)
                        rawData = rawData.replace(/\./g, '').replace(/,/g, '.').replace(/[^0-9.-]+/g, "");
                        return Number(rawData) || 0;
                    }
                    return 0; 
                };

                const getStr = (colChar, rowNum) => {
                    const colIdx = colChar.toUpperCase().charCodeAt(0) - 65; 
                    const rowIdx = rowNum - 1; 
                    if (rows[rowIdx] && rows[rowIdx][colIdx] !== undefined) {
                        return rows[rowIdx][colIdx].replace(/(^"|"$)/g, '').trim();
                    }
                    return "";
                };

                // --- FILTER CERDAS: BLACKLIST NAMA PEKERJAAN KOSONG/JUDUL ---
                const blacklistedNames = [
                  "asesmen gi level ii", "pemeliharaan mtu", "pemeliharaan konektor",
                  "pemeliharaan insulator dan junction", "pemeliharaan konduktor", "technical",
                  "pemeliharaan gsw", "non technical", "preventive action transmisi",
                  "asesmen transmisi level 1", "asesmen transmisi level 2",
                  "asesmen transmisi level i (cui)", "asesmen transmisi level ii",
                  "pemeliharaan insulator, junction dan aksesoris", "pencegahan gangguang akibat petir", 
                  "pencegahan gangguan akibat petir", "pemeliharaan tla", "pencegahan gangguan akibat benda asing"
                ];

                const getDetailsList = (nameCol, targetCol, realCol, startRow, endRow) => {
                    let list = [];
                    for (let i = startRow; i <= endRow; i++) {
                        const name = getStr(nameCol, i);
                        const target = getVal(targetCol, i);
                        const real = getVal(realCol, i);
                        
                        const lowerName = name.toLowerCase().trim();
                        const isBlacklisted = blacklistedNames.some(b => lowerName === b || lowerName.includes(b));
                        
                        if (name !== "" && !isBlacklisted) {
                            list.push({ name: name, target, real });
                        }
                    }
                    return list;
                };

                const makeCategory = (id, item, category, details) => {
                    const completed = details.reduce((sum, d) => sum + d.real, 0);
                    const target = details.reduce((sum, d) => sum + d.target, 0);
                    return { id, item, category, completed, target, details };
                };

                // Menarik Data Gabungan untuk FTE dan Waktu Efektif
                const getCombinedChartData = (startRow1, endRow1, col1, startRow2, endRow2, col2, labelCol) => {
                    let list = [];
                    const count = endRow1 - startRow1 + 1;
                    for(let i=0; i<count; i++) {
                        const label = getStr(labelCol, startRow1 + i) || getStr(labelCol, startRow2 + i) || `Tahun ${i+1}`;
                        const valJaringan = getVal(col1, startRow1 + i);
                        const valGI = getVal(col2, startRow2 + i);
                        
                        // FIX SKALA: Hanya masukkan ke grafik jika nilainya bukan 0
                        if (valJaringan !== 0 || valGI !== 0) {
                            list.push({ name: label, Jaringan: valJaringan, GarduInduk: valGI });
                        }
                    }
                    return list;
                };

                // --- MAPPING DATA ---
                const sem1Data = [
                  makeCategory('g-1', "PREVENTIVE ACTION", 'Gardu Induk', getDetailsList('A', 'C', 'D', 4, 14)),
                  makeCategory('g-2', "CORRECTIVE ACTION", 'Gardu Induk', getDetailsList('A', 'C', 'D', 16, 29)),
                  makeCategory('g-3', "PROGRAM KEANDALAN", 'Gardu Induk', getDetailsList('A', 'C', 'D', 31, 41)),
                  makeCategory('j-1', "PREVENTIVE ACTION", 'Jaringan', getDetailsList('A', 'C', 'D', 50, 59)),
                  makeCategory('j-2', "CORRECTIVE ACTION", 'Jaringan', getDetailsList('A', 'C', 'D', 61, 70)),
                  makeCategory('j-3', "PROGRAM KEANDALAN", 'Jaringan', getDetailsList('A', 'C', 'D', 73, 88))
                ];

                const sem2Data = [
                  makeCategory('g-4', "PREVENTIVE ACTION", 'Gardu Induk', getDetailsList('A', 'F', 'G', 4, 14)),
                  makeCategory('g-5', "CORRECTIVE ACTION", 'Gardu Induk', getDetailsList('A', 'F', 'G', 16, 29)),
                  makeCategory('g-6', "PROGRAM KEANDALAN", 'Gardu Induk', getDetailsList('A', 'F', 'G', 31, 41)),
                  makeCategory('j-4', "PREVENTIVE ACTION", 'Jaringan', getDetailsList('A', 'F', 'G', 50, 59)),
                  makeCategory('j-5', "CORRECTIVE ACTION", 'Jaringan', getDetailsList('A', 'F', 'G', 61, 70)),
                  makeCategory('j-6', "PROGRAM KEANDALAN", 'Jaringan', getDetailsList('A', 'F', 'G', 73, 88))
                ];

                const fteYBYData = getCombinedChartData(107, 115, 'B', 129, 137, 'B', 'A');
                const waktuEfektifData = getCombinedChartData(97, 105, 'B', 119, 127, 'B', 'A');

                setSheetData({
                  semester1: sem1Data,
                  semester2: sem2Data,
                  fteYBY: fteYBYData,
                  waktuEfektif: waktuEfektifData
                });
              })
              .catch(error => {
                console.error("Gagal menarik data:", error);
                setErrorMessage("Gagal mengambil data akurat. Pastikan format CSV dan koordinat sel benar.");
              })
              .finally(() => {
                setIsLoading(false);
              });

          }, [refreshTrigger]); 

          const topMenuItems = [
            { id: 'Overview', label: 'Overview', icon: LayoutDashboard, hasDropdown: false },
            { id: 'Jaringan', label: 'Jaringan', icon: TowerIcon, hasDropdown: true, dropItems: ['FTE', 'Personil'] },
            { id: 'GarduInduk', label: 'Gardu Induk', icon: SwitchyardIcon, hasDropdown: true, dropItems: ['FTE', 'Personil'] },
            { id: 'Realisasi', label: 'Realisasi', icon: CheckSquare, hasDropdown: true },
            { id: 'Target', label: 'Target Kinerja', icon: Target, hasDropdown: true }
          ];

          const currentDisplayData = sheetData[activeSemester] || [];

          const formatChartData = (category) => {
            return currentDisplayData
              .filter(d => d.category === category)
              .map(d => ({
                name: d.item.replace(' ACTION', '').replace('PROGRAM ', ''),
                Target: d.target,
                Realisasi: d.completed
              }));
          };

          const chartDataJaringan = formatChartData('Jaringan');
          const chartDataGI = formatChartData('Gardu Induk');

          const CustomTooltip = ({ active, payload, label }) => {
            if (active && payload && payload.length) {
              return (
                <div className="bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 p-3 rounded-lg shadow-lg">
                  <p className="font-bold text-slate-800 dark:text-slate-100 mb-2">{label}</p>
                  {payload.map((entry, index) => (
                    <p key={`item-${index}`} className="text-sm" style={{ color: entry.color }}>
                      {entry.name}: <span className="font-bold">{typeof entry.value === 'number' ? entry.value.toLocaleString('id-ID') : entry.value}</span>
                    </p>
                  ))}
                </div>
              );
            }
            return null;
          };

          const toggleAccordion = (id) => {
            setExpandedItems(prev => ({ ...prev, [id]: !prev[id] }));
          };

          const toggleCVAccordion = (id) => {
            setExpandedCVs(prev => ({ ...prev, [id]: !prev[id] }));
          };

          // Hapus gambar jika error load agar kembali ke inisial nama
          const handleImageError = (e) => {
            e.target.style.display = 'none';
            e.target.nextSibling.style.display = 'flex';
          };

          return (
            <div className="min-h-screen bg-[#f4f6f9] dark:bg-slate-900 font-sans text-slate-800 dark:text-slate-100 transition-colors duration-300 pb-12">
              
              {/* STICKY TOP NAVIGATION BAR */}
              <div className="sticky top-0 z-30">
                <nav className="bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 px-4 py-3 flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 transition-colors duration-300">
                  <div className="flex items-center gap-4">
                    <div className="relative">
                      <button 
                        onClick={() => setIsMainMenuOpen(!isMainMenuOpen)}
                        onBlur={() => setTimeout(() => setIsMainMenuOpen(false), 200)}
                        className="p-2 border border-slate-200 dark:border-slate-600 rounded-lg text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors cursor-pointer"
                      >
                        <MenuIcon size={20} />
                      </button>

                      {isMainMenuOpen && (
                        <div className="absolute left-0 top-full mt-2 w-52 bg-white dark:bg-slate-800 rounded-lg shadow-lg border border-slate-200 dark:border-slate-700 py-1.5 z-50 animate-in fade-in slide-in-from-top-2 duration-200">
                          {['Personil', 'Target', 'Realisasi', 'Status Alat', 'FTE'].map((item, idx) => (
                            <button 
                              key={idx}
                              className="w-full text-left px-4 py-2.5 text-sm font-semibold text-slate-700 dark:text-slate-300 hover:bg-blue-50 dark:hover:bg-slate-700/50 hover:text-blue-600 dark:hover:text-blue-400 transition-colors"
                              onClick={() => {
                                alert(`Menu ${item} siap dikonfigurasi.`);
                                setIsMainMenuOpen(false);
                              }}
                            >
                              {item}
                            </button>
                          ))}
                        </div>
                      )}
                    </div>

                    <div className="flex items-center gap-3">
                      <div className="bg-blue-600 text-white p-2 rounded-lg shadow-sm flex items-center justify-center w-10 h-10">
                        <Zap size={22} fill="currentColor" />
                      </div>
                      <div>
                        <h1 className="font-bold text-slate-800 dark:text-slate-100 text-lg leading-tight">Dashboard Monitoring Tim PDKB</h1>
                        <p className="text-[11px] text-slate-500 dark:text-slate-400 uppercase tracking-wide">PT PLN (PERSERO) UPT PROBOLINGGO</p>
                      </div>
                    </div>
                  </div>
                  
                  <div className="flex items-center gap-2 self-end sm:self-auto">
                    <button 
                      onClick={() => setRefreshTrigger(prev => prev + 1)} 
                      disabled={isLoading}
                      className="flex items-center gap-2 px-3 py-1.5 border border-slate-200 dark:border-slate-600 rounded-lg text-sm font-medium text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors shadow-sm bg-white dark:bg-slate-800 disabled:opacity-50"
                    >
                      <RefreshCw size={14} className={`text-blue-500 ${isLoading ? 'animate-spin' : ''}`} /> 
                      {isLoading ? 'Memuat...' : 'Refresh'}
                    </button>
                    
                    <button 
                      onClick={() => setIsDarkMode(!isDarkMode)} 
                      className="flex items-center gap-2 px-3 py-1.5 border border-slate-200 dark:border-slate-600 rounded-lg text-sm font-medium text-slate-600 dark:text-slate-300 hover:bg-slate-50 dark:hover:bg-slate-700 transition-colors shadow-sm bg-white dark:bg-slate-800"
                    >
                      {isDarkMode ? (
                        <><Sun size={14} className="text-amber-400" /> Light</>
                      ) : (
                        <><Moon size={14} className="text-indigo-500" /> Dark</>
                      )}
                    </button>
                  </div>
                </nav>

                {/* MENU BAR TENGAH (CENTERED NAV) */}
                <div className="bg-[#0e487a] dark:bg-[#072642] text-white shadow-md transition-colors duration-300">
                  <div className="max-w-7xl mx-auto px-2 flex flex-wrap sm:flex-nowrap justify-center overflow-visible">
                    {topMenuItems.map(menu => (
                      <div key={menu.id} className="relative group flex-1 sm:flex-none">
                        <button
                          onClick={() => {
                            setTopMenu(menu.id);
                            if(menu.id === 'Overview') setCurrentPage('dashboard');
                          }}
                          className={`w-full flex flex-col items-center justify-center min-w-[100px] sm:min-w-[120px] py-2 px-4 border-b-4 transition-all duration-200 ${
                            topMenu === menu.id 
                              ? 'border-[#3eb0f7] text-white bg-white/10' 
                              : 'border-transparent text-blue-200 dark:text-blue-300 hover:text-white hover:bg-white/5'
                          }`}
                        >
                          <menu.icon size={18} className="mb-1" />
                          <div className="flex items-center gap-1.5 text-[11px] font-semibold tracking-wide">
                            {menu.label}
                            {menu.hasDropdown && <ChevronDown size={10} className="opacity-70 group-hover:opacity-100 transition-transform duration-200 group-hover:rotate-180" />}
                          </div>
                        </button>

                        {menu.hasDropdown && (
                          <div className="absolute left-1/2 -translate-x-1/2 top-full mt-0 w-36 bg-white dark:bg-slate-800 rounded-b-lg shadow-xl border border-t-0 border-slate-200 dark:border-slate-700 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 z-50">
                            <div className="py-1">
                              {menu.dropItems ? (
                                <>
                                  <div className="px-3 py-1.5 text-[10px] font-bold text-slate-400 dark:text-slate-500 border-b border-slate-100 dark:border-slate-700/50 uppercase tracking-wider text-center">
                                    Menu Analisis
                                  </div>
                                  {menu.dropItems.map(item => (
                                    <button 
                                      key={item}
                                      className="block w-full text-center px-4 py-2 text-xs font-medium text-slate-700 dark:text-slate-300 hover:bg-blue-50 dark:hover:bg-slate-700 hover:text-blue-600 dark:hover:text-blue-400 transition-colors"
                                      onClick={(e) => {
                                        e.stopPropagation();
                                        if (item === 'Personil') {
                                          setCurrentPage(menu.id === 'Jaringan' ? 'personil-jaringan' : 'personil-gardu-induk');
                                        } else if (item === 'FTE') {
                                          setCurrentPage('fte');
                                        } else {
                                          setCurrentPage(item.toLowerCase());
                                        }
                                      }}
                                    >
                                      {item}
                                    </button>
                                  ))}
                                </>
                              ) : (
                                <>
                                  <div className="px-3 py-1.5 text-[10px] font-bold text-slate-400 dark:text-slate-500 border-b border-slate-100 dark:border-slate-700/50 uppercase tracking-wider text-center">
                                    Pilih Tahun
                                  </div>
                                  {historyYears.map(year => (
                                    <button 
                                      key={year}
                                      className="block w-full text-center px-4 py-2 text-xs font-medium text-slate-700 dark:text-slate-300 hover:bg-blue-50 dark:hover:bg-slate-700 hover:text-blue-600 dark:hover:text-blue-400 transition-colors"
                                      onClick={(e) => {
                                        e.stopPropagation();
                                        alert(`Tahun ${year} dipilih.`);
                                      }}
                                    >
                                      Tahun {year}
                                    </button>
                                  ))}
                                </>
                              )}
                            </div>
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                </div>
              </div>

              {/* AREA HALAMAN (ROUTING SEDERHANA) */}

              {/* --- HALAMAN PERSONIL (CV DIRECTORY) --- */}
              {(currentPage === 'personil-jaringan' || currentPage === 'personil-gardu-induk') ? (
                <main className="max-w-7xl mx-auto p-4 md:p-6 lg:p-8 animate-in fade-in duration-300">
                  <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4 mb-8">
                    <button 
                      onClick={() => setCurrentPage('dashboard')} 
                      className="flex items-center gap-2 text-sm font-bold text-blue-600 dark:text-blue-400 hover:text-blue-800 transition-colors bg-white dark:bg-slate-800 px-4 py-2 rounded-lg shadow-sm border border-slate-200 dark:border-slate-700"
                    >
                      <svg xmlns="http://www.w3.org/2000/svg" width={16} height={16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                      Kembali ke Dashboard
                    </button>
                    
                    <div className={`px-4 py-2 rounded-lg shadow-sm font-bold text-sm flex items-center gap-2 text-white ${currentPage === 'personil-jaringan' ? 'bg-blue-600' : 'bg-emerald-600'}`}>
                      {currentPage === 'personil-jaringan' ? <TowerIcon size={18} /> : <SwitchyardIcon size={18} />}
                      DIREKTORI {currentPage === 'personil-jaringan' ? 'TIM JARINGAN' : 'TIM GARDU INDUK'}
                    </div>
                  </div>

                  <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                    {teamData[currentPage === 'personil-jaringan' ? 'pdkbJaringan' : 'pdkbGarduInduk'].map((member) => (
                      <div key={member.id} className="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-700 overflow-hidden hover:shadow-md transition-all duration-300 flex flex-col group">
                        
                        <div className={`h-16 ${currentPage === 'personil-jaringan' ? 'bg-gradient-to-r from-blue-500 to-indigo-600' : 'bg-gradient-to-r from-emerald-500 to-teal-600'}`}></div>
                        
                        <div className="px-6 pb-6 flex-grow flex flex-col items-center -mt-10">
                          
                          {/* AVATAR DENGAN LOGIKA FOTO PROFIL */}
                          <div className="h-20 w-20 rounded-full bg-white dark:bg-slate-800 p-1.5 shadow-md mb-3 relative overflow-hidden flex items-center justify-center">
                            {member.photo ? (
                              <>
                                <img src={member.photo} alt={member.name} className="h-full w-full object-cover rounded-full bg-slate-100 dark:bg-slate-700" onError={handleImageError} />
                                {/* Fallback jika foto gagal dimuat (nama file salah/tidak ada) */}
                                <div style={{display: 'none'}} className={`h-full w-full rounded-full flex items-center justify-center font-bold text-2xl ${currentPage === 'personil-jaringan' ? 'bg-blue-100 text-blue-700 dark:bg-blue-900 dark:text-blue-300' : 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900 dark:text-emerald-300'}`}>
                                  {getInitials(member.name)}
                                </div>
                              </>
                            ) : (
                              <div className={`h-full w-full rounded-full flex items-center justify-center font-bold text-2xl ${currentPage === 'personil-jaringan' ? 'bg-blue-100 text-blue-700 dark:bg-blue-900 dark:text-blue-300' : 'bg-emerald-100 text-emerald-700 dark:bg-emerald-900 dark:text-emerald-300'}`}>
                                {getInitials(member.name)}
                              </div>
                            )}
                          </div>
                          
                          <h3 className="text-lg font-bold text-slate-900 dark:text-slate-100 text-center leading-tight mb-1">{member.name}</h3>
                          <p className={`text-xs font-bold px-2.5 py-1 rounded-full mb-4 ${currentPage === 'personil-jaringan' ? 'bg-blue-50 text-blue-600 dark:bg-blue-900/30 dark:text-blue-400' : 'bg-emerald-50 text-emerald-600 dark:bg-emerald-900/30 dark:text-emerald-400'}`}>
                            {member.role}
                          </p>
                        </div>
                        
                        <div className="bg-slate-50 dark:bg-slate-800/50 px-6 py-3 border-t border-slate-100 dark:border-slate-700/50 flex justify-center">
                          <button 
                            onClick={() => toggleCVAccordion(member.id)}
                            className={`text-sm font-bold w-full py-2 rounded-lg transition-colors flex items-center justify-center gap-2 ${currentPage === 'personil-jaringan' ? 'text-blue-600 hover:bg-blue-100 dark:text-blue-400 dark:hover:bg-blue-900/30' : 'text-emerald-600 hover:bg-emerald-100 dark:text-emerald-400 dark:hover:bg-emerald-900/30'}`}
                          >
                            {expandedCVs[member.id] ? 'Tutup CV Lengkap' : 'Lihat CV Lengkap'}
                            {expandedCVs[member.id] ? <ChevronUp size={14} /> : <ChevronDown size={14} />}
                          </button>
                        </div>

                        {/* ACCORDION CV CONTENT (POP-DOWN) */}
                        {expandedCVs[member.id] && (
                          <div className="p-5 border-t border-slate-100 dark:border-slate-700/50 bg-slate-50 dark:bg-slate-800/80 animate-in fade-in slide-in-from-top-2 duration-300">
                            <div className="space-y-3 mb-4">
                              <div className="flex items-center text-sm">
                                <div className="w-7 flex justify-start text-slate-400"><BadgeIcon size={14} /></div>
                                <div className="flex-1">
                                  <p className="text-[10px] uppercase font-bold text-slate-400 tracking-wider">NIP</p>
                                  <p className="font-medium text-slate-700 dark:text-slate-300 text-xs">{member.nip || '-'}</p>
                                </div>
                              </div>
                              <div className="flex items-center text-sm">
                                <div className="w-7 flex justify-start text-slate-400"><Mail size={14} /></div>
                                <div className="flex-1">
                                  <p className="text-[10px] uppercase font-bold text-slate-400 tracking-wider">Email</p>
                                  <p className="font-medium text-slate-700 dark:text-slate-300 text-xs">{getDummyEmail(member.name)}</p>
                                </div>
                              </div>
                              <div className="flex items-center text-sm">
                                <div className="w-7 flex justify-start text-slate-400"><Phone size={14} /></div>
                                <div className="flex-1">
                                  <p className="text-[10px] uppercase font-bold text-slate-400 tracking-wider">Telepon</p>
                                  <p className="font-medium text-slate-700 dark:text-slate-300 text-xs">{member.phone || '-'}</p>
                                </div>
                              </div>
                            </div>

                            <div className="bg-white dark:bg-slate-800 rounded-lg p-3 border border-slate-200 dark:border-slate-700 shadow-sm">
                              <h4 className="text-[11px] font-extrabold text-slate-800 dark:text-slate-200 uppercase tracking-wider mb-2 flex items-center gap-1.5">
                                <AwardIcon size={12} className={currentPage === 'personil-jaringan' ? 'text-blue-500' : 'text-emerald-500'} />
                                Sertifikat Kompetensi
                              </h4>
                              <ul className="space-y-1.5">
                                {member.sertifikat && member.sertifikat.length > 0 ? (
                                  member.sertifikat.map((cert, idx) => (
                                    <li key={idx} className="text-xs text-slate-600 dark:text-slate-400 flex items-start gap-1.5 leading-tight">
                                      <span className={`mt-1.5 w-1 h-1 rounded-full flex-shrink-0 ${currentPage === 'personil-jaringan' ? 'bg-blue-400' : 'bg-emerald-400'}`}></span>
                                      <span>{cert}</span>
                                    </li>
                                  ))
                                ) : (
                                  <li className="text-xs text-slate-400 italic">Belum ada data sertifikat</li>
                                )}
                              </ul>
                            </div>
                          </div>
                        )}
                      </div>
                    ))}
                  </div>
                </main>

              ) : currentPage === 'fte' ? (
                // --- HALAMAN FTE ---
                <main className="max-w-7xl mx-auto p-4 md:p-6 lg:p-8 animate-in fade-in duration-300">
                  <button 
                    onClick={() => setCurrentPage('dashboard')} 
                    className="mb-6 flex items-center gap-2 text-sm font-bold text-blue-600 dark:text-blue-400 hover:text-blue-800 transition-colors bg-white dark:bg-slate-800 px-4 py-2 rounded-lg shadow-sm border border-slate-200 dark:border-slate-700 w-fit"
                  >
                    <svg xmlns="http://www.w3.org/2000/svg" width={16} height={16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                    Kembali ke Dashboard Utama
                  </button>

                  <div className="bg-white dark:bg-slate-800 rounded-3xl border border-slate-200 dark:border-slate-700 shadow-sm p-6 mb-8">
                    <h2 className="text-lg font-extrabold text-slate-800 dark:text-slate-100 mb-6 uppercase tracking-wider text-center">
                      Grafik FTE Year by Year
                    </h2>
                    <div className="h-80 w-full mb-8">
                      {isLoading ? (
                         <div className="h-full flex items-center justify-center text-slate-400 text-sm animate-pulse">Menarik data grafik...</div>
                      ) : (
                        <ResponsiveContainer width="100%" height="100%">
                          <LineChart data={sheetData.fteYBY} margin={{ top: 10, right: 10, left: -20, bottom: 0 }}>
                            <CartesianGrid strokeDasharray="3 3" vertical={false} stroke={isDarkMode ? '#334155' : '#e2e8f0'} />
                            <XAxis dataKey="name" tick={{ fontSize: 11, fill: isDarkMode ? '#94a3b8' : '#64748b' }} />
                            <YAxis domain={['dataMin', 'dataMax']} padding={{ top: 20, bottom: 20 }} tick={{ fontSize: 11, fill: isDarkMode ? '#94a3b8' : '#64748b' }} />
                            <Tooltip content={<CustomTooltip />} />
                            <Legend wrapperStyle={{ fontSize: '12px', paddingTop: '10px' }} />
                            <Line type="monotone" dataKey="Jaringan" stroke="#3b82f6" strokeWidth={3} dot={{ r: 4 }} activeDot={{ r: 6 }} />
                            <Line type="monotone" dataKey="GarduInduk" name="Gardu Induk" stroke="#10b981" strokeWidth={3} dot={{ r: 4 }} activeDot={{ r: 6 }} />
                          </LineChart>
                        </ResponsiveContainer>
                      )}
                    </div>
                    <div className="overflow-x-auto">
                      <table className="w-full text-sm text-left text-slate-600 dark:text-slate-300">
                        <thead className="text-xs text-slate-500 uppercase bg-slate-50 dark:bg-slate-700 dark:text-slate-400">
                          <tr>
                            <th className="px-4 py-3 rounded-l-lg border-b border-slate-200 dark:border-slate-600">Tahun / Periode</th>
                            <th className="px-4 py-3 text-right text-blue-600 dark:text-blue-400 border-b border-slate-200 dark:border-slate-600">FTE Jaringan</th>
                            <th className="px-4 py-3 text-right text-emerald-600 dark:text-emerald-400 rounded-r-lg border-b border-slate-200 dark:border-slate-600">FTE Gardu Induk</th>
                          </tr>
                        </thead>
                        <tbody>
                          {(sheetData.fteYBY || []).map((row, idx) => (
                            <tr key={idx} className="border-b border-slate-100 dark:border-slate-700 last:border-0 hover:bg-slate-50 dark:hover:bg-slate-800/50">
                              <td className="px-4 py-2.5 font-medium">{row.name}</td>
                              <td className="px-4 py-2.5 text-right font-bold">{typeof row.Jaringan === 'number' ? row.Jaringan.toLocaleString('id-ID') : row.Jaringan}</td>
                              <td className="px-4 py-2.5 text-right font-bold">{typeof row.GarduInduk === 'number' ? row.GarduInduk.toLocaleString('id-ID') : row.GarduInduk}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>

                  <div className="bg-white dark:bg-slate-800 rounded-3xl border border-slate-200 dark:border-slate-700 shadow-sm p-6">
                    <h2 className="text-lg font-extrabold text-slate-800 dark:text-slate-100 mb-6 uppercase tracking-wider text-center">
                      Waktu Efektif Kerja Pertahun
                    </h2>
                    <div className="h-80 w-full mb-8">
                      {isLoading ? (
                         <div className="h-full flex items-center justify-center text-slate-400 text-sm animate-pulse">Menarik data grafik...</div>
                      ) : (
                        <ResponsiveContainer width="100%" height="100%">
                          <LineChart data={sheetData.waktuEfektif} margin={{ top: 10, right: 10, left: -20, bottom: 0 }}>
                            <CartesianGrid strokeDasharray="3 3" vertical={false} stroke={isDarkMode ? '#334155' : '#e2e8f0'} />
                            <XAxis dataKey="name" tick={{ fontSize: 11, fill: isDarkMode ? '#94a3b8' : '#64748b' }} />
                            <YAxis domain={['dataMin', 'dataMax']} padding={{ top: 20, bottom: 20 }} tick={{ fontSize: 11, fill: isDarkMode ? '#94a3b8' : '#64748b' }} />
                            <Tooltip content={<CustomTooltip />} />
                            <Legend wrapperStyle={{ fontSize: '12px', paddingTop: '10px' }} />
                            <Line type="monotone" dataKey="Jaringan" stroke="#3b82f6" strokeWidth={3} dot={{ r: 4 }} activeDot={{ r: 6 }} />
                            <Line type="monotone" dataKey="GarduInduk" name="Gardu Induk" stroke="#10b981" strokeWidth={3} dot={{ r: 4 }} activeDot={{ r: 6 }} />
                          </LineChart>
                        </ResponsiveContainer>
                      )}
                    </div>
                    <div className="overflow-x-auto">
                      <table className="w-full text-sm text-left text-slate-600 dark:text-slate-300">
                        <thead className="text-xs text-slate-500 uppercase bg-slate-50 dark:bg-slate-700 dark:text-slate-400">
                          <tr>
                            <th className="px-4 py-3 rounded-l-lg border-b border-slate-200 dark:border-slate-600">Tahun / Periode</th>
                            <th className="px-4 py-3 text-right text-blue-600 dark:text-blue-400 border-b border-slate-200 dark:border-slate-600">Jam Efektif Jaringan</th>
                            <th className="px-4 py-3 text-right text-emerald-600 dark:text-emerald-400 rounded-r-lg border-b border-slate-200 dark:border-slate-600">Jam Efektif Gardu Induk</th>
                          </tr>
                        </thead>
                        <tbody>
                          {(sheetData.waktuEfektif || []).map((row, idx) => (
                            <tr key={idx} className="border-b border-slate-100 dark:border-slate-700 last:border-0 hover:bg-slate-50 dark:hover:bg-slate-800/50">
                              <td className="px-4 py-2.5 font-medium">{row.name}</td>
                              <td className="px-4 py-2.5 text-right font-bold">{typeof row.Jaringan === 'number' ? row.Jaringan.toLocaleString('id-ID') : row.Jaringan}</td>
                              <td className="px-4 py-2.5 text-right font-bold">{typeof row.GarduInduk === 'number' ? row.GarduInduk.toLocaleString('id-ID') : row.GarduInduk}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                </main>

              ) : (
                
                // --- HALAMAN DASHBOARD UTAMA ---
                <main className="max-w-7xl mx-auto p-4 md:p-6 lg:p-8 animate-in fade-in duration-300">
                  
                  {errorMessage && (
                    <div className="mb-6 bg-amber-50 dark:bg-amber-950/30 border-l-4 border-amber-500 p-4 rounded-md text-amber-800 dark:text-amber-400 text-xs font-medium shadow-sm">
                      💡 {errorMessage}
                    </div>
                  )}

                  {/* SEKSI GRAFIK DASHBOARD (Dengan Toggle Internal) */}
                  <section className="mb-8">
                    <div className="bg-white dark:bg-slate-800 rounded-3xl border border-slate-200 dark:border-slate-700 shadow-sm p-6 transition-colors duration-300">
                      
                      <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-8 gap-4 border-b border-slate-100 dark:border-slate-700/50 pb-4">
                        <h2 className="text-sm font-extrabold text-slate-500 dark:text-slate-400 tracking-wider uppercase flex items-center gap-2">
                          <svg xmlns="http://www.w3.org/2000/svg" width={18} height={18} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-blue-500"><line x1="18" y1="20" x2="18" y2="10"></line><line x1="12" y1="20" x2="12" y2="4"></line><line x1="6" y1="20" x2="6" y2="14"></line></svg>
                          Grafik Performa Target vs Realisasi
                        </h2>
                        
                        <div className="bg-slate-100 dark:bg-slate-900 p-1.5 rounded-lg inline-flex shadow-inner">
                          <button 
                            onClick={() => setActiveSemester('semester1')} 
                            className={`px-4 py-1.5 rounded-md text-[11px] font-bold transition-all duration-300 ${
                              activeSemester === 'semester1' 
                                ? 'bg-white dark:bg-slate-700 text-blue-600 dark:text-blue-400 shadow-sm transform scale-105' 
                                : 'text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200'
                            }`}
                          >
                            SEMESTER 1
                          </button>
                          <button 
                            onClick={() => setActiveSemester('semester2')} 
                            className={`px-4 py-1.5 rounded-md text-[11px] font-bold transition-all duration-300 ${
                              activeSemester === 'semester2' 
                                ? 'bg-white dark:bg-slate-700 text-blue-600 dark:text-blue-400 shadow-sm transform scale-105' 
                                : 'text-slate-500 dark:text-slate-400 hover:text-slate-800 dark:hover:text-slate-200'
                            }`}
                          >
                            SEMESTER 2
                          </button>
                        </div>
                      </div>

                      <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div className="w-full">
                          <h3 className="text-xs font-bold text-blue-600 dark:text-blue-400 tracking-widest mb-6 text-center">KETERCAPAIAN JARINGAN</h3>
                          <div className="h-64 w-full">
                            {isLoading ? (
                               <div className="h-full flex items-center justify-center text-slate-400 text-sm animate-pulse">Menarik data grafik...</div>
                            ) : (
                              <ResponsiveContainer width="100%" height="100%">
                                <BarChart data={chartDataJaringan} margin={{ top: 10, right: 10, left: -20, bottom: 0 }}>
                                  <CartesianGrid strokeDasharray="3 3" vertical={false} stroke={isDarkMode ? '#334155' : '#e2e8f0'} />
                                  <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{ fontSize: 10, fill: isDarkMode ? '#94a3b8' : '#64748b' }} />
                                  <YAxis axisLine={false} tickLine={false} tick={{ fontSize: 10, fill: isDarkMode ? '#94a3b8' : '#64748b' }} />
                                  <Tooltip content={<CustomTooltip />} cursor={{ fill: isDarkMode ? '#1e293b' : '#f1f5f9' }} />
                                  <Legend wrapperStyle={{ fontSize: '11px', paddingTop: '10px' }} />
                                  <Bar dataKey="Target" fill={isDarkMode ? '#3b82f6' : '#93c5fd'} radius={[4, 4, 0, 0]} barSize={25} />
                                  <Bar dataKey="Realisasi" fill={isDarkMode ? '#60a5fa' : '#2563eb'} radius={[4, 4, 0, 0]} barSize={25} />
                                </BarChart>
                              </ResponsiveContainer>
                            )}
                          </div>
                        </div>

                        <div className="w-full relative">
                          <div className="hidden md:block absolute -left-4 top-4 bottom-4 w-px bg-slate-200 dark:bg-slate-700/80"></div>
                          <h3 className="text-xs font-bold text-emerald-600 dark:text-emerald-400 tracking-widest mb-6 text-center">KETERCAPAIAN GARDU INDUK</h3>
                          <div className="h-64 w-full">
                            {isLoading ? (
                               <div className="h-full flex items-center justify-center text-slate-400 text-sm animate-pulse">Menarik data grafik...</div>
                            ) : (
                              <ResponsiveContainer width="100%" height="100%">
                                <BarChart data={chartDataGI} margin={{ top: 10, right: 10, left: -20, bottom: 0 }}>
                                  <CartesianGrid strokeDasharray="3 3" vertical={false} stroke={isDarkMode ? '#334155' : '#e2e8f0'} />
                                  <XAxis dataKey="name" axisLine={false} tickLine={false} tick={{ fontSize: 10, fill: isDarkMode ? '#94a3b8' : '#64748b' }} />
                                  <YAxis axisLine={false} tickLine={false} tick={{ fontSize: 10, fill: isDarkMode ? '#94a3b8' : '#64748b' }} />
                                  <Tooltip content={<CustomTooltip />} cursor={{ fill: isDarkMode ? '#1e293b' : '#f1f5f9' }} />
                                  <Legend wrapperStyle={{ fontSize: '11px', paddingTop: '10px' }} />
                                  <Bar dataKey="Target" fill={isDarkMode ? '#10b981' : '#6ee7b7'} radius={[4, 4, 0, 0]} barSize={25} />
                                  <Bar dataKey="Realisasi" fill={isDarkMode ? '#34d399' : '#059669'} radius={[4, 4, 0, 0]} barSize={25} />
                                </BarChart>
                              </ResponsiveContainer>
                            )}
                          </div>
                        </div>
                      </div>
                    </div>
                  </section>

                  <section>
                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-5">
                      
                      {/* KOLOM 1: PERSONIL TIM */}
                      <div className="bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm p-5 flex flex-col transition-colors duration-300">
                        <div className="flex justify-between items-center mb-5">
                          <h2 className="text-xl font-extrabold text-slate-800 dark:text-slate-100 tracking-tight">PERSONIL TIM</h2>
                        </div>
                        
                        <div className="mb-4">
                          <div className="flex justify-between items-center py-2.5 border-b border-dashed border-slate-200 dark:border-slate-700 text-sm">
                            <span className="text-slate-500 dark:text-slate-400">Asman PDKB</span>
                            <span className="font-bold text-slate-800 dark:text-slate-100 text-right">{teamData.assistantManager.name}</span>
                          </div>
                        </div>

                        <div className="flex gap-1 mb-3 bg-slate-100 dark:bg-slate-900/50 p-1 rounded-lg">
                          <button onClick={() => setActiveTab('pdkbJaringan')} className={`flex-1 text-center py-1.5 text-[11px] font-bold rounded-md transition-all ${activeTab === 'pdkbJaringan' ? 'bg-white dark:bg-slate-700 text-blue-600 dark:text-blue-400 shadow-sm' : 'text-slate-500 dark:text-slate-400'}`}>
                            Jaringan
                          </button>
                          <button onClick={() => setActiveTab('pdkbGarduInduk')} className={`flex-1 text-center py-1.5 text-[11px] font-bold rounded-md transition-all ${activeTab === 'pdkbGarduInduk' ? 'bg-white dark:bg-slate-700 text-emerald-600 dark:text-emerald-400 shadow-sm' : 'text-slate-500 dark:text-slate-400'}`}>
                            Gardu Induk
                          </button>
                        </div>

                        <div className="flex-1 overflow-y-auto pr-1 max-h-80 space-y-1">
                          {teamData[activeTab].map((member) => (
                            <div key={member.id} className="flex justify-between items-center py-2.5 border-b border-dashed border-slate-200 dark:border-slate-700 last:border-0">
                              <span className="text-slate-600 dark:text-slate-300 text-[13px] font-medium truncate pr-2">{member.name}</span>
                              <span className="font-bold text-slate-800 dark:text-slate-100 text-[12px] whitespace-nowrap text-right">{member.role}</span>
                            </div>
                          ))}
                        </div>
                      </div>

                      {/* KOLOM 2: REALISASI JARINGAN (Accordion) */}
                      <div className="bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm p-5 flex flex-col transition-colors duration-300">
                        <div className="flex justify-between items-center mb-5">
                          <h2 className="text-xl font-extrabold text-blue-600 dark:text-blue-400 tracking-tight">DETAIL JARINGAN</h2>
                        </div>
                        <div className="flex-1 space-y-3">
                          {isLoading ? (
                            <div className="text-center py-4 text-sm text-slate-400 animate-pulse">Menarik data...</div>
                          ) : (
                            currentDisplayData.filter(d => d.category === 'Jaringan').map((r) => {
                              const percentage = r.target > 0 ? Math.round((r.completed / r.target) * 100) : 0;
                              const isExpanded = expandedItems[r.id];

                              return (
                                <div key={r.id} className="py-2 border-b border-dashed border-slate-200 dark:border-slate-700 last:border-0">
                                  <div 
                                    className="flex justify-between items-center mb-1.5 cursor-pointer group"
                                    onClick={() => toggleAccordion(r.id)}
                                  >
                                    <span className="text-slate-700 dark:text-slate-300 text-[13px] font-bold tracking-wide group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors">
                                      {r.item}
                                    </span>
                                    <div className="flex items-center gap-2">
                                      <span className="font-extrabold text-[13px] text-blue-600 dark:text-blue-400">
                                        {r.completed}/{r.target} <span className="ml-1 text-[10px] bg-blue-50 dark:bg-blue-900/40 px-1.5 py-0.5 rounded">{percentage}%</span>
                                      </span>
                                      {isExpanded ? 
                                        <ChevronUp size={16} className="text-slate-400 group-hover:text-blue-500" /> : 
                                        <ChevronDown size={16} className="text-slate-400 group-hover:text-blue-500" />
                                      }
                                    </div>
                                  </div>
                                  
                                  <div className="w-full bg-slate-100 dark:bg-slate-700 h-1.5 rounded-full overflow-hidden">
                                    <div className="bg-blue-500 h-full transition-all duration-500" style={{ width: `${Math.min(percentage, 100)}%` }}></div>
                                  </div>

                                  {isExpanded && (
                                    <div className="mt-3 bg-slate-50 dark:bg-slate-800/80 rounded-xl p-3.5 space-y-2 border border-slate-100 dark:border-slate-700 animate-in fade-in slide-in-from-top-2 duration-300">
                                      {r.details && r.details.length > 0 ? (
                                        r.details.map((detail, idx) => (
                                          <div key={idx} className="flex justify-between items-center text-[12px] border-b border-slate-200 dark:border-slate-700/50 last:border-0 pb-1.5 last:pb-0">
                                            <span className="text-slate-600 dark:text-slate-400">{detail.name}</span>
                                            <span className={`font-bold ${detail.real >= detail.target ? 'text-green-600 dark:text-green-500' : 'text-amber-500'}`}>
                                              {detail.real} / {detail.target}
                                            </span>
                                          </div>
                                        ))
                                      ) : (
                                        <div className="text-xs text-slate-400 text-center italic py-2">Tidak ada rincian.</div>
                                      )}
                                    </div>
                                  )}
                                </div>
                              );
                            })
                          )}
                        </div>
                      </div>

                      {/* KOLOM 3: REALISASI GARDU INDUK (Accordion) */}
                      <div className="bg-white dark:bg-slate-800 rounded-2xl border border-slate-200 dark:border-slate-700 shadow-sm p-5 flex flex-col transition-colors duration-300">
                        <div className="flex justify-between items-center mb-5">
                          <h2 className="text-xl font-extrabold text-emerald-600 dark:text-emerald-400 tracking-tight">DETAIL GARDU INDUK</h2>
                        </div>
                        <div className="flex-1 space-y-3">
                          {isLoading ? (
                            <div className="text-center py-4 text-sm text-slate-400 animate-pulse">Menarik data...</div>
                          ) : (
                            currentDisplayData.filter(d => d.category === 'Gardu Induk').map((r) => {
                              const percentage = r.target > 0 ? Math.round((r.completed / r.target) * 100) : 0;
                              const isExpanded = expandedItems[r.id];

                              return (
                                <div key={r.id} className="py-2 border-b border-dashed border-slate-200 dark:border-slate-700 last:border-0">
                                  <div 
                                    className="flex justify-between items-center mb-1.5 cursor-pointer group"
                                    onClick={() => toggleAccordion(r.id)}
                                  >
                                    <span className="text-slate-700 dark:text-slate-300 text-[13px] font-bold tracking-wide group-hover:text-emerald-600 dark:group-hover:text-emerald-400 transition-colors">
                                      {r.item}
                                    </span>
                                    <div className="flex items-center gap-2">
                                      <span className="font-extrabold text-[13px] text-emerald-600 dark:text-emerald-400">
                                        {r.completed}/{r.target} <span className="ml-1 text-[10px] bg-emerald-50 dark:bg-emerald-900/40 px-1.5 py-0.5 rounded">{percentage}%</span>
                                      </span>
                                      {isExpanded ? 
                                        <ChevronUp size={16} className="text-slate-400 group-hover:text-emerald-500" /> : 
                                        <ChevronDown size={16} className="text-slate-400 group-hover:text-emerald-500" />
                                      }
                                    </div>
                                  </div>
                                  
                                  <div className="w-full bg-slate-100 dark:bg-slate-700 h-1.5 rounded-full overflow-hidden">
                                    <div className="bg-emerald-500 h-full transition-all duration-500" style={{ width: `${Math.min(percentage, 100)}%` }}></div>
                                  </div>

                                  {isExpanded && (
                                    <div className="mt-3 bg-slate-50 dark:bg-slate-800/80 rounded-xl p-3.5 space-y-2 border border-slate-100 dark:border-slate-700 animate-in fade-in slide-in-from-top-2 duration-300">
                                      {r.details && r.details.length > 0 ? (
                                        r.details.map((detail, idx) => (
                                          <div key={idx} className="flex justify-between items-center text-[12px] border-b border-slate-200 dark:border-slate-700/50 last:border-0 pb-1.5 last:pb-0">
                                            <span className="text-slate-600 dark:text-slate-400">{detail.name}</span>
                                            <span className={`font-bold ${detail.real >= detail.target ? 'text-green-600 dark:text-green-500' : 'text-amber-500'}`}>
                                              {detail.real} / {detail.target}
                                            </span>
                                          </div>
                                        ))
                                      ) : (
                                        <div className="text-xs text-slate-400 text-center italic py-2">Tidak ada rincian.</div>
                                      )}
                                    </div>
                                  )}
                                </div>
                              );
                            })
                          )}
                        </div>
                      </div>

                    </div>
                  </section>
                </main>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <style>
      .hide-scrollbar::-webkit-scrollbar { display: none; }
      .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</body>
</html>
